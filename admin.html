<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — LumiTeQ Solutions</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.5rem;
  --text-2xl: 2rem;

  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-12: 3rem;

  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-2xl: 1.5rem;

  --font-display: 'Cabinet Grotesk', 'Helvetica Neue', sans-serif;
  --font-body: 'Satoshi', 'Inter', sans-serif;
}

:root, [data-theme="dark"] {
  --color-bg: #0a0c10;
  --color-surface: #0f1219;
  --color-surface-2: #141720;
  --color-border: #272d3e;
  --color-text: #e8eaf0;
  --color-text-muted: #8890a6;
  --color-text-faint: #4a5168;
  --color-primary: #00d4ff;
  --color-primary-hover: #00b8de;
  --color-primary-highlight: #0d2535;
  --color-danger: #ef4444;
  --color-danger-hover: #dc2626;
  --color-success: #22c55e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.6;
  padding: var(--space-8);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.header {
  margin-bottom: var(--space-8);
  padding-bottom: var(--space-6);
  border-bottom: 1px solid var(--color-border);
}

.header h1 {
  font-size: var(--text-2xl);
  font-weight: 700;
  margin-bottom: var(--space-2);
}

.header p {
  color: var(--color-text-muted);
}

.tabs {
  display: flex;
  gap: var(--space-2);
  margin-bottom: var(--space-8);
  border-bottom: 1px solid var(--color-border);
}

.tab {
  padding: var(--space-3) var(--space-6);
  background: transparent;
  border: none;
  color: var(--color-text-muted);
  cursor: pointer;
  font-size: var(--text-base);
  font-weight: 500;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}

.tab:hover {
  color: var(--color-text);
}

.tab.active {
  color: var(--color-primary);
  border-bottom-color: var(--color-primary);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-6);
  margin-bottom: var(--space-8);
}

.form-group {
  margin-bottom: var(--space-4);
}

.form-group.full-width {
  grid-column: span 2;
}

label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: var(--space-2);
}

input, textarea, select {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  transition: border-color 0.2s;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--color-primary);
}

textarea {
  resize: vertical;
  min-height: 100px;
}

.tag-input-container {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  padding: var(--space-2);
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
}

.tag {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: 4px var(--space-3);
  background: var(--color-primary-highlight);
  border: 1px solid var(--color-primary);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  color: var(--color-primary);
}

.tag button {
  background: none;
  border: none;
  color: var(--color-primary);
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  font-size: 16px;
  line-height: 1;
}

.tag button:hover {
  color: var(--color-primary-hover);
}

#tagInput {
  border: none;
  background: transparent;
  flex: 1;
  min-width: 120px;
  padding: var(--space-2);
}

#tagInput:focus {
  outline: none;
  border: none;
}

.file-input-wrapper {
  position: relative;
}

.file-input-label {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-6);
  background: var(--color-surface-2);
  border: 2px dashed var(--color-border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: all 0.2s;
}

.file-input-label:hover {
  border-color: var(--color-primary);
  background: var(--color-primary-highlight);
}

.file-input-label.has-file {
  border-style: solid;
  border-color: var(--color-success);
}

input[type="file"] {
  display: none;
}

.preview-image {
  max-width: 200px;
  margin-top: var(--space-3);
  border-radius: var(--radius-md);
  border: 1px solid var(--color-border);
}

.btn {
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-md);
  font-size: var(--text-base);
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--color-primary);
  color: var(--color-bg);
}

.btn-primary:hover {
  background: var(--color-primary-hover);
}

.btn-danger {
  background: var(--color-danger);
  color: white;
}

.btn-danger:hover {
  background: var(--color-danger-hover);
}

.btn-secondary {
  background: var(--color-surface-2);
  color: var(--color-text);
  border: 1px solid var(--color-border);
}

.btn-secondary:hover {
  background: var(--color-surface);
}

.projects-list {
  display: grid;
  gap: var(--space-4);
}

.project-item {
  display: grid;
  grid-template-columns: 100px 1fr auto;
  gap: var(--space-4);
  padding: var(--space-4);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  align-items: center;
}

.project-thumb {
  width: 100px;
  height: 60px;
  border-radius: var(--radius-md);
  object-fit: cover;
  background: var(--color-surface-2);
}

.project-info h3 {
  font-size: var(--text-lg);
  margin-bottom: var(--space-2);
}

.project-info p {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.project-actions {
  display: flex;
  gap: var(--space-2);
}

.contacts-list {
  display: grid;
  gap: var(--space-4);
}

.contact-item {
  padding: var(--space-4);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
}

.contact-item h3 {
  font-size: var(--text-lg);
  margin-bottom: var(--space-2);
}

.contact-item p {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  margin-bottom: var(--space-2);
}

.contact-item .message {
  margin-top: var(--space-3);
  padding: var(--space-3);
  background: var(--color-surface-2);
  border-radius: var(--radius-md);
  color: var(--color-text);
}

.alert {
  padding: var(--space-4);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-6);
  font-weight: 500;
}

.alert-success {
  background: rgba(34, 197, 94, 0.1);
  border: 1px solid var(--color-success);
  color: var(--color-success);
}

.alert-error {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid var(--color-danger);
  color: var(--color-danger);
}

.loading {
  text-align: center;
  padding: var(--space-8);
  color: var(--color-text-muted);
}

.empty-state {
  text-align: center;
  padding: var(--space-12);
  color: var(--color-text-muted);
}

@media (max-width: 768px) {
  .form-grid {
    grid-template-columns: 1fr;
  }
  
  .form-group.full-width {
    grid-column: span 1;
  }
  
  .project-item {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🔧 Admin Panel</h1>
    <p>Manage projects and view contact submissions</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="add-project">Add Project</button>
    <button class="tab" data-tab="manage-projects">Manage Projects</button>
    <button class="tab" data-tab="contacts">Contact Submissions</button>
  </div>

  <!-- Add Project Tab -->
  <div class="tab-content active" id="add-project">
    <div id="addProjectAlert"></div>
    
    <form id="projectForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="projectName">Project Name *</label>
          <input type="text" id="projectName" required>
        </div>

        <div class="form-group">
          <label for="projectEmoji">Emoji Icon *</label>
          <input type="text" id="projectEmoji" placeholder="🏪" maxlength="2" required>
        </div>

        <div class="form-group full-width">
          <label for="projectDescription">Description *</label>
          <textarea id="projectDescription" rows="4" required></textarea>
        </div>

        <div class="form-group">
          <label for="projectTheme">Theme Color *</label>
          <select id="projectTheme" required>
            <option value="retail">Retail (Cyan/Purple)</option>
            <option value="ecom">E-Commerce (Green/Cyan)</option>
            <option value="report">Report (Orange/Red)</option>
            <option value="pos">POS (Purple/Cyan)</option>
            <option value="inventory">Inventory (Purple/Sky)</option>
            <option value="crm">CRM (Pink/Orange)</option>
            <option value="analytics">Analytics (Blue/Green)</option>
            <option value="mobile">Mobile (Teal/Indigo)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="projectOrder">Display Order (0 = first)</label>
          <input type="number" id="projectOrder" value="0" min="0">
        </div>

        <div class="form-group full-width">
          <label>Technologies *</label>
          <div class="tag-input-container" id="tagsContainer">
            <input type="text" id="tagInput" placeholder="Type a tag and press Enter">
          </div>
          <input type="hidden" id="projectTags">
        </div>

        <div class="form-group full-width">
          <label for="projectImage">Project Image</label>
          <div class="file-input-wrapper">
            <label for="projectImage" class="file-input-label" id="fileLabel">
              <span>📁 Click to upload image or drag & drop</span>
            </label>
            <input type="file" id="projectImage" accept="image/*">
          </div>
          <img id="imagePreview" class="preview-image" style="display:none;">
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Add Project</button>
      <button type="button" class="btn btn-secondary" id="resetForm" style="margin-left: 1rem;">Reset Form</button>
    </form>
  </div>

  <!-- Manage Projects Tab -->
  <div class="tab-content" id="manage-projects">
    <div id="projectsLoading" class="loading">Loading projects...</div>
    <div id="projectsList" class="projects-list"></div>
  </div>

  <!-- Contacts Tab -->
  <div class="tab-content" id="contacts">
    <div id="contactsLoading" class="loading">Loading contacts...</div>
    <div id="contactsList" class="contacts-list"></div>
  </div>
</div>

<script>
// Supabase Configuration
const SUPABASE_URL = 'https://neriwbcpducpkwmpfieb.supabase.co';
// ⚠️ IMPORTANT: Replace this with your ACTUAL anon/public API key from Supabase Dashboard
// Go to: Settings > API > Copy the "anon public" key (starts with eyJ...)
// OR open test-connection.html to get your correct key
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lcml3YmNwZHVjcGt3bXBmaWViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDcwOTgsImV4cCI6MjA5NzI4MzA5OH0.D9udViUr-Zk5NOcMqkvWqbHCfXA-agWYOHsCDIIrDyk';

// Check if API key needs to be updated
if (SUPABASE_KEY === 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lcml3YmNwZHVjcGt3bXBmaWViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDcwOTgsImV4cCI6MjA5NzI4MzA5OH0.D9udViUr-Zk5NOcMqkvWqbHCfXA-agWYOHsCDIIrDyk' || !SUPABASE_KEY.startsWith('eyJ')) {
  alert('❌ ERROR: Invalid Supabase API key!\n\n1. Open test-connection.html to get your correct API key\n2. Update SUPABASE_KEY in admin.html\n3. Refresh this page');
  console.error('❌ SUPABASE ERROR: Invalid API key! Update SUPABASE_KEY in admin.html');
}

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Tags Management
let tags = [];
const tagInput = document.getElementById('tagInput');
const tagsContainer = document.getElementById('tagsContainer');

tagInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const value = tagInput.value.trim();
    if (value && !tags.includes(value)) {
      tags.push(value);
      renderTags();
      tagInput.value = '';
      document.getElementById('projectTags').value = JSON.stringify(tags);
    }
  }
});

function renderTags() {
  const existingTags = tagsContainer.querySelectorAll('.tag');
  existingTags.forEach(tag => tag.remove());
  
  tags.forEach((tag, index) => {
    const tagEl = document.createElement('div');
    tagEl.className = 'tag';
    tagEl.innerHTML = `
      ${tag}
      <button type="button" onclick="removeTag(${index})">×</button>
    `;
    tagsContainer.insertBefore(tagEl, tagInput);
  });
}

function removeTag(index) {
  tags.splice(index, 1);
  renderTags();
  document.getElementById('projectTags').value = JSON.stringify(tags);
}

// Image Preview
const imageInput = document.getElementById('projectImage');
const imagePreview = document.getElementById('imagePreview');
const fileLabel = document.getElementById('fileLabel');

imageInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      imagePreview.src = e.target.result;
      imagePreview.style.display = 'block';
      fileLabel.classList.add('has-file');
      fileLabel.querySelector('span').textContent = `✓ ${file.name}`;
    };
    reader.readAsDataURL(file);
  }
});

// Tab Switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const targetTab = tab.dataset.tab;
    
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    tab.classList.add('active');
    document.getElementById(targetTab).classList.add('active');
    
    if (targetTab === 'manage-projects') {
      loadProjects();
    } else if (targetTab === 'contacts') {
      loadContacts();
    }
  });
});

// Form Submission
document.getElementById('projectForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const alertDiv = document.getElementById('addProjectAlert');
  alertDiv.innerHTML = '';
  
  try {
    const name = document.getElementById('projectName').value;
    const emoji = document.getElementById('projectEmoji').value;
    const description = document.getElementById('projectDescription').value;
    const theme = document.getElementById('projectTheme').value;
    const order = parseInt(document.getElementById('projectOrder').value);
    const imageFile = imageInput.files[0];
    
    if (tags.length === 0) {
      throw new Error('Please add at least one technology tag');
    }
    
    let imageUrl = null;
    
    // Upload image if provided
    if (imageFile) {
      const fileExt = imageFile.name.split('.').pop();
      const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${fileExt}`;
      
      const { data: uploadData, error: uploadError } = await supabase.storage
        .from('project-images')
        .upload(fileName, imageFile);
      
      if (uploadError) throw uploadError;
      
      const { data: { publicUrl } } = supabase.storage
        .from('project-images')
        .getPublicUrl(fileName);
      
      imageUrl = publicUrl;
    }
    
    // Insert project
    const { data, error } = await supabase
      .from('projects')
      .insert([{
        name: name,
        emoji: emoji,
        description: description,
        theme: theme,
        tags: tags,
        image_url: imageUrl,
        display_order: order
      }])
      .select();
    
    if (error) throw error;
    
    alertDiv.innerHTML = '<div class="alert alert-success">✓ Project added successfully!</div>';
    document.getElementById('resetForm').click();
    
    setTimeout(() => {
      alertDiv.innerHTML = '';
    }, 3000);
    
  } catch (error) {
    console.error('Error:', error);
    alertDiv.innerHTML = `<div class="alert alert-error">✗ Error: ${error.message}</div>`;
  }
});

// Reset Form
document.getElementById('resetForm').addEventListener('click', () => {
  document.getElementById('projectForm').reset();
  tags = [];
  renderTags();
  imagePreview.style.display = 'none';
  fileLabel.classList.remove('has-file');
  fileLabel.querySelector('span').textContent = '📁 Click to upload image or drag & drop';
});

// Load Projects
async function loadProjects() {
  const loadingDiv = document.getElementById('projectsLoading');
  const listDiv = document.getElementById('projectsList');
  
  loadingDiv.style.display = 'block';
  listDiv.innerHTML = '';
  
  try {
    const { data, error } = await supabase
      .from('projects')
      .select('*')
      .order('display_order', { ascending: true });
    
    if (error) throw error;
    
    loadingDiv.style.display = 'none';
    
    if (data.length === 0) {
      listDiv.innerHTML = '<div class="empty-state">No projects yet. Add your first project!</div>';
      return;
    }
    
    data.forEach(project => {
      const projectEl = document.createElement('div');
      projectEl.className = 'project-item';
      projectEl.innerHTML = `
        <div class="project-thumb" style="background: ${getThemeGradient(project.theme)}; display: flex; align-items: center; justify-content: center; font-size: 2rem;">
          ${project.emoji}
        </div>
        <div class="project-info">
          <h3>${project.name}</h3>
          <p>${project.description}</p>
        </div>
        <div class="project-actions">
          <button class="btn btn-danger" onclick="deleteProject('${project.id}')">Delete</button>
        </div>
      `;
      listDiv.appendChild(projectEl);
    });
    
  } catch (error) {
    console.error('Error loading projects:', error);
    loadingDiv.style.display = 'none';
    listDiv.innerHTML = `<div class="alert alert-error">Error loading projects: ${error.message}</div>`;
  }
}

// Delete Project
async function deleteProject(id) {
  if (!confirm('Are you sure you want to delete this project?')) return;
  
  try {
    const { error } = await supabase
      .from('projects')
      .delete()
      .eq('id', id);
    
    if (error) throw error;
    
    loadProjects();
  } catch (error) {
    alert('Error deleting project: ' + error.message);
  }
}

// Load Contacts
async function loadContacts() {
  const loadingDiv = document.getElementById('contactsLoading');
  const listDiv = document.getElementById('contactsList');
  
  loadingDiv.style.display = 'block';
  listDiv.innerHTML = '';
  
  try {
    const { data, error } = await supabase
      .from('contacts')
      .select('*')
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    
    loadingDiv.style.display = 'none';
    
    if (data.length === 0) {
      listDiv.innerHTML = '<div class="empty-state">No contact submissions yet.</div>';
      return;
    }
    
    data.forEach(contact => {
      const contactEl = document.createElement('div');
      contactEl.className = 'contact-item';
      const date = new Date(contact.created_at).toLocaleString();
      contactEl.innerHTML = `
        <h3>${contact.name}</h3>
        <p><strong>Email:</strong> ${contact.email}</p>
        <p><strong>Phone:</strong> ${contact.phone || 'Not provided'}</p>
        <p><strong>Company:</strong> ${contact.company || 'Not provided'}</p>
        <p><strong>Date:</strong> ${date}</p>
        <div class="message">
          <strong>Message:</strong><br>
          ${contact.message}
        </div>
      `;
      listDiv.appendChild(contactEl);
    });
    
  } catch (error) {
    console.error('Error loading contacts:', error);
    loadingDiv.style.display = 'none';
    listDiv.innerHTML = `<div class="alert alert-error">Error loading contacts: ${error.message}</div>`;
  }
}

// Theme gradient helper
function getThemeGradient(theme) {
  const gradients = {
    retail: 'linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(124, 58, 237, 0.15))',
    ecom: 'linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(0, 212, 255, 0.12))',
    report: 'linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(239, 68, 68, 0.1))',
    pos: 'linear-gradient(135deg, rgba(124, 58, 237, 0.18), rgba(0, 212, 255, 0.1))',
    inventory: 'linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(6, 182, 212, 0.15))',
    crm: 'linear-gradient(135deg, rgba(236, 72, 153, 0.18), rgba(249, 115, 22, 0.12))',
    analytics: 'linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(16, 185, 129, 0.15))',
    mobile: 'linear-gradient(135deg, rgba(20, 184, 166, 0.18), rgba(99, 102, 241, 0.15))'
  };
  return gradients[theme] || gradients.retail;
}
</script>

</body>
</html>
